apiVersion: v1
kind: Secret
metadata:
  name: archcore-jwe-key
  namespace: archcore
  labels:
    app: archcore
type: Opaque
data:
  # Generate with: cat private.pem | base64 -w 0
  jwe-private.pem: <BASE64_ENCODED_PRIVATE_KEY>
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: archcore-app
  namespace: archcore
  labels:
    app: archcore
spec:
  replicas: 2
  selector:
    matchLabels:
      app: archcore
  template:
    metadata:
      labels:
        app: archcore
    spec:
      containers:
        - name: archcore-app
          image: archcore-app:latest
          ports:
            - containerPort: 8081
          env:
            # JWE key location (same as Docker)
            - name: JWE_PRIVATE_KEY_LOCATION
              value: "/etc/secrets/jwe-private.pem"
            # Keycloak
            - name: KEYCLOAK_ISSUER_URI
              value: "http://keycloak:8080/realms/archcore"
            # PostgreSQL
            - name: POSTGRES_HOST
              value: "postgresql"
            - name: POSTGRES_PORT
              value: "5432"
            - name: POSTGRES_DB
              value: "archcore"
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgresql-credentials
                  key: username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgresql-credentials
                  key: password
          volumeMounts:
            # Mount JWE key (same path as Docker volume mount)
            - name: jwe-key
              mountPath: /etc/secrets
              readOnly: true
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: jwe-key
          secret:
            secretName: archcore-jwe-key
            items:
              - key: jwe-private.pem
                path: jwe-private.pem
                mode: 0400
---
apiVersion: v1
kind: Service
metadata:
  name: archcore-app
  namespace: archcore
spec:
  selector:
    app: archcore
  ports:
    - port: 8081
      targetPort: 8081
      protocol: TCP
  type: ClusterIP