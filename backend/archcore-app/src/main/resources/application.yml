spring:
  application:
    name: archcore-app

  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5433}/${POSTGRES_DB:keycloak}
    username: ${POSTGRES_USER:keycloak}
    password: ${POSTGRES_PASSWORD:gizlisifre}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.xml

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8080/realms/archcore}

server:
  port: ${SERVER_PORT:8081}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized

archcore:
  security:
    jwe:
      # JWE private key file path
      # Docker: Mount key file to this path
      # Kubernetes: Mount Secret/ConfigMap to this path
      private-key-location: ${JWE_PRIVATE_KEY_LOCATION:/etc/secrets/jwe-private.pem}
